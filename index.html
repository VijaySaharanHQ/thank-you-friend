<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You for Being My Friend</title>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        text-align: center;
        max-width: 450px;
        animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
        color: #ff4b5c;
        font-size: 28px;
    }

    input {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        width: 80%;
        margin-top: 15px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        background: #ff4b5c;
        color: white;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #e63946;
        transform: scale(1.05);
    }

    .heart {
        font-size: 50px;
        margin: 15px 0;
        animation: beat 1s infinite;
    }

    #message {
        margin-top: 15px;
        font-size: 18px;
        color: #444;
    }

    iframe {
        margin-top: 20px;
        border-radius: 10px;
    }

    @keyframes beat {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="container">
    <h1 id="title">Thank You for Being My Friend 💖</h1>

    <input type="text" id="friendName" placeholder="Enter your friend's name">
    <br>
    <button onclick="generateMessage()">Create Surprise 🎁</button>

    <div class="heart">❤️</div>

    <p id="message"></p>

    <!-- YouTube Music Embed -->
    <iframe width="100%" height="200"
        src="https://www.youtube.com/embed/6k8cpUkKK4c?autoplay=1&mute=1&loop=1&playlist=6k8cpUkKK4c"
        allow="autoplay">
    </iframe>
</div>

<script>
function generateMessage() {
    let name = document.getElementById("friendName").value;

    if(name === "") {
        alert("Please enter your friend's name!");
        return;
    }

    document.getElementById("title").innerText =
        "Thank You, " + name + ", for Being My Friend 💖";

    document.getElementById("message").innerText =
        name + ", you make my life happier and brighter. I'm lucky to have you 😊";

    // 🎉 Confetti Animation
    confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
    });
}
</script>

</body>
</html>
